<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3DGS Thematic Viewer</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #ui-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 14px 18px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 220px;
      backdrop-filter: blur(6px);
    }
    #ui-panel select, #ui-panel input[type=range] { width: 100%; }
    .colorbar { height: 12px; border-radius: 4px; }
    .colorbar-plasma  { background: linear-gradient(to right, #0d0887, #7e03a8, #cc4778, #f89441, #f0f921); }
    .colorbar-viridis { background: linear-gradient(to right, #440154, #31688e, #35b779, #fde725); }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: monospace;
      font-size: 16px;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="loading">Loading scene…</div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
